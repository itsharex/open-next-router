syntax "next-router/0.1";

# GCP Vertex AI Gemini via service account JSON.
provider "vertex" {
  defaults {
    upstream_config {
      base_url = "https://aiplatform.googleapis.com";
    }

    auth {
      oauth_mode google_service_account_file;
      oauth_scope "https://www.googleapis.com/auth/cloud-platform";
      auth_oauth_bearer;
    }

    request {
      set_header "Content-Type" "application/json";
      set_header "x-goog-user-project" template("${credential.project_id}");
    }

    response {
      resp_passthrough;
    }

    models {
      models_mode vertex;
    }
  }

  match api = "chat.completions" {
    request {
      model_map_default concat("google/", $request.model);
      json_replace "$.model" $request.model_mapped;
    }

    upstream {
      set_path template("/v1/projects/${credential.project_id}/locations/${channel.location}/endpoints/openapi/chat/completions");
    }

    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
  }

  match api = "gemini.generateContent" {
    upstream {
      set_path template("/v1/projects/${credential.project_id}/locations/${channel.location}/publishers/google/models/${request.model_mapped}:generateContent");
    }

    metrics {
      usage_extract gemini_generate_content;
      finish_reason_extract gemini_generate_content;
    }
  }

  match api = "gemini.streamGenerateContent" {
    upstream {
      set_path template("/v1/projects/${credential.project_id}/locations/${channel.location}/publishers/google/models/${request.model_mapped}:streamGenerateContent");
      set_query alt "sse";
    }

    metrics {
      usage_extract gemini_generate_content_stream;
      finish_reason_extract gemini_generate_content_stream;
    }
  }
}
