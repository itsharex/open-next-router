syntax "next-router/0.1";

models_mode "openai" {
  method GET;
  path "/v1/models";
  id_path "$.data[*].id";
}

models_mode "gemini" {
  method GET;
  path "/v1beta/models";
  id_path "$.models[*].name";
  id_regex "^models/(.+)$";
}

models_mode "vertex" {
  method GET;
  path template("/v1/projects/${credential.project_id}/locations/${channel.location}/models");
  id_path "$.models[*].name";
  id_regex "^projects/[^/]+/locations/[^/]+/models/(.+)$";
}
