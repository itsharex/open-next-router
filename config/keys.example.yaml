providers:
  openai:
    keys:
      - name: "key1"
        # Option A: plaintext (not recommended for public repos)
        value: "sk-xxxx"
        # Optional: override provider base_url (e.g. route via proxy)
        # base_url_override: "https://api.openai.com"

  anthropic:
    keys:
      - name: "key1"
        # Option B: encrypted value (requires ONR_MASTER_KEY at runtime)
        # value: "ENC[v1:aesgcm:...]"
        #
        # Option C: leave empty and provide env override:
        #   ONR_UPSTREAM_KEY_ANTHROPIC_KEY1=sk-ant-xxxx
        value: ""

  gemini:
    keys:
      - name: "key1"
        # Recommended: provide env override:
        #   ONR_UPSTREAM_KEY_GEMINI_KEY1=AIzaSy...
        value: ""

  vertex:
    keys:
      - name: "vertex-sa"
        # GCP Vertex AI uses a service account JSON file instead of an API key.
        # Recommended file permission: 0600, owned by the ONR runtime user.
        credential_file: "/etc/onr/gcp/vertex-sa.json"
        # Empty location defaults to global at runtime. Regional example: us-central1.
        location: "global"
        # Optional: override provider base_url explicitly, for example to use a regional endpoint.
        # base_url_override: "https://us-central1-aiplatform.googleapis.com"

# Access keys for clients (for token key: onr:v1?...&k64=...).
access_keys:
  - name: "client-a"
    value: ""
    comment: "example client access key (set via env: ONR_ACCESS_KEY_CLIENT_A)"
